<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>LEP Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  color: #222;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #ffffff;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h2 { margin-top: 0; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

label {
  background: #eef2f7;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #d0d7de;
}

canvas {
  background: #ffffff;
  border-radius: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2>📊 LEP Viewer</h2>
  <input type="file" id="fileInput">

  <div class="controls">
    <label><input type="checkbox" id="w1" checked> Težina1</label>
    <label><input type="checkbox" id="e1"> Greška1</label>
    <label><input type="checkbox" id="w2"> Težina2</label>
    <label><input type="checkbox" id="e2"> Greška2</label>
    <label><input type="checkbox" id="temp" checked> Temperatura</label>
    <label><input type="checkbox" id="volt" checked> Napon</label>
  </div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

</div>

<script>
let chart = null;

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => parseData(event.target.result);
  reader.readAsText(file);
}

function parseData(text) {
  const lines = text.split("\n");

  const times=[], w1=[], e1=[], w2=[], e2=[], temp=[], volt=[];

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    try {
      const p = line.split("|");
      if (p.length < 7) return;

      const v = [
        parseFloat(p[1]),
        parseFloat(p[2].replace("+/-","")),
        parseFloat(p[3]),
        parseFloat(p[4].replace("+/-","")),
        parseFloat(p[5]),
        parseFloat(p[6])
      ];

      if (v.some(x => isNaN(x))) return;

      times.push(p[0]);
      w1.push(v[0]);
      e1.push(v[1]);
      w2.push(v[2]);
      e2.push(v[3]);
      temp.push(v[4]);
      volt.push(v[5]);

    } catch {}
  });

  drawChart(times, w1, e1, w2, e2, temp, volt);
}

function ds(label, data, color, visible, yAxisID=null) {
  return {
    label,
    data,
    borderColor: color,
    borderWidth: 2,
    pointRadius: 1,
    tension: 0.25,
    hidden: !visible,
    yAxisID
  };
}

function drawChart(times, w1, e1, w2, e2, temp, volt) {

  if (chart) chart.destroy();

  const all = [
    {id:"w1", label:"Težina1", data:w1, color:"#0077b6"},
    {id:"e1", label:"Greška1", data:e1, color:"#90caf9"},
    {id:"w2", label:"Težina2", data:w2, color:"#ef6c00"},
    {id:"e2", label:"Greška2", data:e2, color:"#ba68c8"},
    {id:"temp", label:"Temperatura", data:temp, color:"#d32f2f"},
    {id:"volt", label:"Napon", data:volt, color:"#2e7d32"}
  ];

  const active = all.filter(d => document.getElementById(d.id).checked);

  let datasets = [];
  let scales = {
    x: { ticks: { color: "#555", maxTicksLimit: 10 } }
  };

  if (active.length === 2) {
    // 🔥 DVA PARAMETRA → SVAKI SVOJA OSA
    datasets = [
      ds(active[0].label, active[0].data, active[0].color, true, "y1"),
      ds(active[1].label, active[1].data, active[1].color, true, "y2")
    ];

    scales.y1 = {
      type: 'linear',
      position: 'left',
      ticks: { color: active[0].color }
    };

    scales.y2 = {
      type: 'linear',
      position: 'right',
      ticks: { color: active[1].color },
      grid: { drawOnChartArea: false }
    };

  } else {
    // 🔥 3+ → STANDARDNO (kao pre)
    datasets = all.map(d =>
      ds(d.label, d.data, d.color, document.getElementById(d.id).checked)
    );

    scales.y = {
      ticks: { color: "#555" }
    };
  }

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: times,
      datasets
    },
    options: {
      responsive: true,
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: {
          labels: { color: "#333" }
        }
      },
      scales
    }
  });
}

// toggle
document.querySelectorAll("input[type=checkbox]").forEach(cb => {
  cb.addEventListener("change", () => {
    if (!chart) return;

    // samo ponovo nacrtaj (ključno!)
    document.getElementById('fileInput').dispatchEvent(new Event('change'));
  });
});
</script>

</body>
</html>
