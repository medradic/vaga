<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>LEP Pro Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #0b0f14;
  color: #e6edf3;
}

h2 {
  margin-bottom: 10px;
}

.controls {
  margin: 15px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

label {
  background: #161b22;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

canvas {
  background: #11161c;
  border-radius: 10px;
  padding: 10px;
}

button {
  background: #238636;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 LEP Pro Viewer</h2>

<input type="file" id="fileInput">

<div class="controls">
  <label><input type="checkbox" id="w1" checked> W1</label>
  <label><input type="checkbox" id="w2"> W2</label>
  <label><input type="checkbox" id="e1"> E1</label>
  <label><input type="checkbox" id="e2"> E2</label>
  <label><input type="checkbox" id="temp" checked> Temp</label>
  <label><input type="checkbox" id="volt" checked> Volt</label>

  <button onclick="resetZoom()">Reset Zoom</button>
</div>

<canvas id="chart"></canvas>

<script>
let chart;

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => parseData(event.target.result);
  reader.readAsText(file);
}

function parseData(text) {
  const lines = text.split("\n");

  const times=[], w1=[], e1=[], w2=[], e2=[], temp=[], volt=[];

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    try {
      const p = line.split("|");
      if (p.length < 7) return;

      const v = [
        parseFloat(p[1]), parseFloat(p[2].replace("+/-","")),
        parseFloat(p[3]), parseFloat(p[4].replace("+/-","")),
        parseFloat(p[5]), parseFloat(p[6])
      ];

      if (v.some(x => isNaN(x))) return;

      times.push(p[0]);
      w1.push(v[0]);
      e1.push(v[1]);
      w2.push(v[2]);
      e2.push(v[3]);
      temp.push(v[4]);
      volt.push(v[5]);

    } catch {}
  });

  drawChart(times, w1, e1, w2, e2, temp, volt);
}

function ds(label, data, color, id) {
  return {
    label,
    data,
    borderColor: color,
    borderWidth: 2,
    pointRadius: 0,
    tension: 0.25,
    hidden: !document.getElementById(id).checked
  };
}

function drawChart(t, w1, e1, w2, e2, temp, volt) {

  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type: 'line',
    data: {
      labels: t,
      datasets: [
        ds("Weight 1", w1, "#00e5ff", "w1"),
        ds("Error 1", e1, "#2979ff", "e1"),
        ds("Weight 2", w2, "#ff9100", "w2"),
        ds("Error 2", e2, "#aa00ff", "e2"),
        ds("Temp (C)", temp, "#ff5252", "temp"),
        ds("Volt (V)", volt, "#00e676", "volt")
      ]
    },
    options: {
      responsive: true,
      interaction: {
        mode: 'index',
        intersect: false
      },

      plugins: {
        legend: {
          labels: { color: "#ccc" }
        },

        tooltip: {
          backgroundColor: "#111",
          borderColor: "#444",
          borderWidth: 1,
          titleColor: "#fff",
          bodyColor: "#ddd"
        },

        zoom: {
          pan: {
            enabled: true,
            mode: 'x'
          },
          zoom: {
            wheel: { enabled: true },
            pinch: { enabled: true },
            mode: 'x'
          }
        }
      },

      scales: {
        x: {
          ticks: { color: "#aaa", maxTicksLimit: 10 }
        },
        y: {
          ticks: { color: "#aaa" }
        }
      }
    }
  });
}

// toggle
document.querySelectorAll("input[type=checkbox]").forEach(cb => {
  cb.addEventListener("change", () => {
    if (!chart) return;

    chart.data.datasets[0].hidden = !w1.checked;
    chart.data.datasets[1].hidden = !e1.checked;
    chart.data.datasets[2].hidden = !w2.checked;
    chart.data.datasets[3].hidden = !e2.checked;
    chart.data.datasets[4].hidden = !temp.checked;
    chart.data.datasets[5].hidden = !volt.checked;

    chart.update();
  });
});

// reset zoom
function resetZoom() {
  if (chart) chart.resetZoom();
}
</script>

</body>
</html>
