<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>LEP Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  color: #222;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #ffffff;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 0;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

label {
  background: #eef2f7;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #d0d7de;
}

input[type="file"] {
  margin-bottom: 10px;
}

canvas {
  background: #ffffff;
  border-radius: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2>📊 LEP Viewer</h2>
  <input type="file" id="fileInput">

  <div class="controls">
    <label><input type="checkbox" id="w1" checked> Težina1</label>
    <label><input type="checkbox" id="e1"> Greška1</label>
    <label><input type="checkbox" id="w2"> Težina2</label>
    <label><input type="checkbox" id="e2"> Greška2</label>
    <label><input type="checkbox" id="temp" checked> Temperatura</label>
    <label><input type="checkbox" id="volt" checked> Napon</label>
  </div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

</div>

<script>
let chart = null;

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => parseData(event.target.result);
  reader.readAsText(file);
}

function parseData(text) {
  const lines = text.split("\n");

  const times=[], w1=[], e1=[], w2=[], e2=[], temp=[], volt=[];

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    try {
      const p = line.split("|");
      if (p.length < 7) return;

      const v = [
        parseFloat(p[1]),
        parseFloat(p[2].replace("+/-","")),
        parseFloat(p[3]),
        parseFloat(p[4].replace("+/-","")),
        parseFloat(p[5]),
        parseFloat(p[6])
      ];

      if (v.some(x => isNaN(x))) return;

      times.push(p[0]);
      w1.push(v[0]);
      e1.push(v[1]);
      w2.push(v[2]);
      e2.push(v[3]);
      temp.push(v[4]);
      volt.push(v[5]);

    } catch {}
  });

  drawChart(times, w1, e1, w2, e2, temp, volt);
}

function ds(label, data, color, visible) {
  return {
    label,
    data,
    borderColor: color,
    borderWidth: 2,
    pointRadius: 1,
    tension: 0.25,
    hidden: !visible
  };
}

function drawChart(times, w1, e1, w2, e2, temp, volt) {

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: times,
      datasets: [
        ds("Težina1", w1, "#0077b6", document.getElementById("w1").checked),
        ds("Greška1", e1, "#90caf9", document.getElementById("e1").checked),
        ds("Težina2", w2, "#ef6c00", document.getElementById("w2").checked),
        ds("Greška2", e2, "#ba68c8", document.getElementById("e2").checked),
        ds("Temperatura", temp, "#d32f2f", document.getElementById("temp").checked),
        ds("Napon", volt, "#2e7d32", document.getElementById("volt").checked)
      ]
    },
    options: {
      responsive: true,
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: {
          labels: { color: "#333" }
        }
      },
      scales: {
        x: {
          ticks: { color: "#555", maxTicksLimit: 10 }
        },
        y: {
          ticks: { color: "#555" }
        }
      }
    }
  });
}

// toggle
document.querySelectorAll("input[type=checkbox]").forEach(cb => {
  cb.addEventListener("change", () => {
    if (!chart) return;

    const ids = ["w1","e1","w2","e2","temp","volt"];

    ids.forEach((id, i) => {
      chart.data.datasets[i].hidden = !document.getElementById(id).checked;
    });

    chart.update();
  });
});
</script>

</body>
</html>
